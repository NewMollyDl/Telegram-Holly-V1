<html lang="en">
<head>

    <style>
        :root {
            --plyr-color-main: #e50914; 
            --primary-color: #e50914;
            --primary-glow: rgba(229, 9, 20, 0.6);
            --background-primary: #0f0f0f;
            --background-secondary: #212121;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --border-color: #333;
            --card-radius: 16px;
            --transition-fast: 0.2s;
            --transition-medium: 0.4s;
            --notification-bg: rgba(20, 20, 20, 0.9);
            --info-color: #3498db;
            --warning-color: #f39c12;
        }

        body.light-mode {
            --background-primary: #f9f9f9;
            --background-secondary: #eeeeee;
            --text-primary: #030303;
            --text-secondary: #606060;
            --border-color: #dddddd;
            --notification-bg: rgba(240, 240, 240, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* FIX: Remove blue tap highlight on all interactive elements */
        button, a, input[type="button"], input[type="submit"] {
            outline: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-focus-ring-color: transparent;
        }
        button:focus, a:focus, button:active, a:active {
            outline: none;
            box-shadow: none;
        }

        body {
            background-color: var(--background-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-color var(--transition-medium), color var(--transition-medium);
            user-select: none;
        }

        .video-header {
            max-width: 1280px; margin: 0 auto 25px auto;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px;
        }
        .header-btn {
            background: transparent; border: none; border-radius: 50%; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center; color: var(--text-primary);
            cursor: pointer; transition: all var(--transition-fast) ease; text-decoration: none; flex-shrink: 0;
        }
        .header-btn:hover { background: var(--background-secondary); }
        .header-btn svg { width: 22px; height: 22px; fill: currentColor; }
        
        #video-title {
            font-size: 1.6rem; font-weight: 600; flex-grow: 1; text-align: center;
            padding: 0 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .theme-switch { display: inline-block; height: 30px; position: relative; width: 56px; }
        .theme-switch input { display: none; }
        .slider {
            background-color: var(--background-secondary); bottom: 0; cursor: pointer;
            left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            background-color: #fff; bottom: 4px; content: ""; height: 22px; left: 4px;
            position: absolute; transition: .4s; width: 22px; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(26px); }

        .video-wrapper { max-width: 1280px; width: 95%; margin: 0 auto; position: relative; }
        .player-container {
            border-radius: var(--card-radius); overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            position: relative; background: #000;
        }
        
        #ambient-canvas {
            position: absolute; top: 50%; left: 50%; width: 110%; height: 110%;
            transform: translate(-50%, -50%); z-index: 1;
            filter: blur(40px) brightness(0.8); opacity: 0;
            transition: opacity 0.7s ease-in-out; pointer-events: none;
        }
        #ambient-canvas.active { opacity: 1; }
        
        .skeleton-loader, .loading-spinner {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 100; transition: opacity 0.5s; backdrop-filter: blur(5px);
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .skip-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 21;
            display: flex; justify-content: space-between; align-items: center; pointer-events: none; opacity: 0;
        }
        .skip-overlay.active { opacity: 1; transition: opacity 0.1s ease; }
        .skip-icon {
            color: white; background: rgba(0,0,0,0.6); border-radius: 50%;
            width: 50px; height: 50px; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            margin: 0 60px; animation: skip-pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .skip-icon.show { display: flex; }
        .skip-icon svg { width: 24px; height: 24px; }
        .skip-icon span { font-size: 11px; font-weight: bold; margin-top: 1px; }
        @keyframes skip-pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .quality-controls { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .quality-btn {
            background: var(--background-secondary); border: none; border-radius: 20px; padding: 8px 16px;
            color: var(--text-primary); cursor: pointer; transition: all var(--transition-fast) ease; font-weight: 500;
        }
        .quality-btn:hover { background-color: var(--border-color); }
        .quality-btn.active { background: var(--primary-color); color: #fff; box-shadow: 0 0 10px var(--primary-glow); }

        #notification {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            padding: 12px 22px; border-radius: 8px; font-weight: 500; z-index: 9999;
            background: var(--notification-bg); backdrop-filter: blur(10px); color: var(--text-primary);
            opacity: 0; transition: opacity 0.3s, bottom 0.3s; pointer-events: none;
            display: flex; align-items: center; gap: 10px;
            border-left: 5px solid var(--info-color);
        }
        #notification.show { bottom: 100px; opacity: 1; }
        #notification.warning { border-left-color: var(--warning-color); }

        .plyr { border-radius: var(--card-radius); z-index: 2; }
        .plyr--video .plyr__controls { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); padding-top: 20px; }
        .plyr__control--overlaid, .plyr--video .plyr__control:hover, .plyr--video .plyr__control[aria-expanded=true] { background: var(--primary-color); }

        /* Buffer progress bar shown during pre-buffer phase */
        #buffer-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0, 0, 0, 0.82); z-index: 101; backdrop-filter: blur(5px);
        }
        #buffer-overlay.visible { display: flex; }
        .buffer-label {
            color: var(--text-secondary); font-size: 0.9rem;
            margin-bottom: 14px; font-weight: 500; letter-spacing: 0.5px;
        }
        .buffer-track {
            width: 220px; height: 4px; background: var(--border-color);
            border-radius: 4px; overflow: hidden;
        }
        .buffer-fill {
            height: 100%; width: 0%;
            background: var(--primary-color);
            border-radius: 4px;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px var(--primary-glow);
        }
        .buffer-percent {
            color: var(--text-primary); font-size: 0.85rem;
            margin-top: 10px; font-weight: 600;
        }

        /* ── ADS — UNTOUCHED ── */
        .custom-ad-section {
            width: 100%; max-width: 800px; margin: 20px auto;
            text-align: center; font-family: Arial, sans-serif;
            background-color: transparent; padding: 10px;
        }
        .download-buttons-container {
            display: flex; justify-content: center; gap: 25px;
            margin-bottom: 20px; flex-wrap: wrap; padding-top: 15px;
        }
        .premium-btn-wrapper { position: relative; display: inline-block; }
        .premium-btn {
            display: inline-block;
            background: linear-gradient(135deg, #e50914, #b20710);
            color: #ffffff !important; text-decoration: none;
            padding: 15px 30px; border-radius: 8px; font-weight: 800; font-size: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4); min-width: 180px;
            border: 1px solid #ff4b55; text-transform: uppercase;
            letter-spacing: 1px; animation: pulse 2s infinite;
        }
        .premium-btn.btn-alt {
            background: linear-gradient(135deg, #1f80e0, #125ca6);
            box-shadow: 0 4px 15px rgba(31, 128, 224, 0.4);
            border: 1px solid #4da3ff; animation-delay: 1s;
        }
        .premium-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
            color: #ffffff !important; animation: none;
        }
        .badge {
            position: absolute; top: -12px; right: -10px;
            background-color: #ffcc00; color: #000000;
            font-size: 11px; font-weight: bold; padding: 4px 8px;
            border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 10; border: 1px solid #fff;
        }
        .badge-alt { background-color: #00e676; color: #000; }
        @keyframes pulse {
            0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); }
        }
        .sponsor-text {
            color: var(--text-secondary); font-size: 11px; margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .native-ad-container {
            margin-top: 10px; min-height: 100px; display: flex;
            justify-content: center; align-items: center; width: 100%;
            overflow: hidden; background: var(--background-secondary); border-radius: 8px;
        }

        @media (max-width: 768px) {
            #video-title { font-size: 1.2rem; }
            .plyr__controls__item { transform: scale(1.1); margin: 0 5px !important; }
        }
    </style>
</head>

    <!--  ANTI-DEBUGGING — runs synchronously before page renders    -->
    <!-- ════════════════════════════════════════════════════════════ -->
    <script>
    (function() {
        'use strict';

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && ['I','C','J','K'].includes(String.fromCharCode(e.keyCode))) {
                e.preventDefault(); return false;
            }
            if (e.ctrlKey && ['U','S'].includes(String.fromCharCode(e.keyCode))) {
                e.preventDefault(); return false;
            }
        });

        function triggerSecurityViolation() {
            document.querySelectorAll('video').forEach(v => {
                try { v.pause(); v.src = ''; } catch(_) {}
            });
            document.body.innerHTML = [
                '<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f0f0f;',
                'display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;">',
                '<div style="background:#c0392b;padding:40px 60px;border-radius:12px;text-align:center;max-width:500px;">',
                '<svg width="64" height="64" viewBox="0 0 24 24" fill="#fff" style="margin-bottom:16px">',
                '<path d="M12 2L1 21h22L12 2zm0 3.5L20.5 19h-17L12 5.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/></svg>',
                '<h2 style="color:#fff;font-size:1.4rem;font-family:sans-serif;margin-bottom:12px;">Security Violation</h2>',
                '<p style="color:rgba(255,255,255,0.85);font-family:sans-serif;font-size:0.95rem;line-height:1.6;">',
                'Developer Tools are not permitted on this page.<br>Close DevTools and refresh to continue.</p>',
                '</div></div>'
            ].join('');
        }

        var _devtoolsOpen = false;

        // Method 1: debugger timing trap
        setInterval(function() {
            var t = performance.now();
            (function(){}['constructor']('debugger')());
            if (performance.now() - t > 100 && !_devtoolsOpen) {
                _devtoolsOpen = true;
                triggerSecurityViolation();
            }
        }, 1000);

        // Method 2: window size heuristic (docked devtools)
        setInterval(function() {
            if ((window.outerWidth - window.innerWidth > 160 ||
                 window.outerHeight - window.innerHeight > 160) && !_devtoolsOpen) {
                _devtoolsOpen = true;
                triggerSecurityViolation();
            }
        }, 1500);
    })();
    </script>

    <script>
    document.addEventListener('DOMContentLoaded', function () {
        'use strict';

        // ── DOM refs ──────────────────────────────────────────────
        const videoPlayer     = document.getElementById('video-player');
        const skeletonLoader  = document.getElementById('skeleton-loader');
        const loadingSpinner  = document.getElementById('loading-spinner');
        const bufferOverlay   = document.getElementById('buffer-overlay');
        const bufferFill      = document.getElementById('buffer-fill');
        const bufferPercent   = document.getElementById('buffer-percent');
        const videoTitle      = document.getElementById('video-title');
        const qualityControls = document.getElementById('quality-controls');
        const ambientCanvas   = document.getElementById('ambient-canvas');
        const themeToggle     = document.getElementById('theme-toggle');

        let player          = null;
        let animationFrameId= null;
        const ambientCtx    = ambientCanvas.getContext('2d');

        // ── State ─────────────────────────────────────────────────
        let currentToken        = null;   // live token appended to every URL
        let currentBaseStreamUrl= null;   // raw URL without ?token=
        let currentPostId       = null;
        let tokenRefreshInterval= null;
        let bufferCheckInterval = null;
        let isSwapping          = false;  // guard to prevent concurrent token swaps

        // ── How many seconds of buffer we demand before first play ─
        // The backend bursts fast for 10 s. We ask for 8 s of buffer
        // so normal playback never drains it, even after throttle kicks in.
        const MIN_BUFFER_SECONDS = 8;

        // ════════════════════════════════════════════════════════════
        //  UTILITY: build a tokenised URL
        // ════════════════════════════════════════════════════════════
        function buildUrl(base, token) {
            if (!token) return base;
            const sep = base.includes('?') ? '&' : '?';
            return `${base}${sep}token=${encodeURIComponent(token)}`;
        }

        // ════════════════════════════════════════════════════════════
        //  TOKEN FETCHING
        //  Your aiohttp endpoint should return: { "token": "abc..." }
        // ════════════════════════════════════════════════════════════
        async function fetchToken(postId) {
            const res = await fetch(
                `/api/get_token?video_id=${encodeURIComponent(postId)}&_=${Date.now()}`
            );
            if (!res.ok) throw new Error(`Token endpoint returned ${res.status}`);
            const data = await res.json();
            if (!data || !data.token) throw new Error('Token missing in response');
            return data.token;
        }

        // ════════════════════════════════════════════════════════════
        //  TOKEN REFRESH STRATEGY FOR DIRECT MP4
        //
        //  Problem: once the browser opens a byte-range connection to
        //  /stream/{id}?token=OLD, it keeps that TCP connection alive.
        //  We cannot hot-swap the token inside the existing connection.
        //
        //  Solution (Seamless Seek-Resume Swap):
        //   1. Silently fetch a new token every 45 s.
        //   2. If the video has >= MIN_BUFFER_SECONDS buffered ahead,
        //      the user will NOT notice a re-connect (buffer covers it).
        //   3. We save currentTime, point videoPlayer.src at the new
        //      tokenised URL, then seek back and resume.
        //   4. The browser sends a Range: bytes=N request to the new
        //      URL, the backend bursts again from that byte offset,
        //      and the buffer refills within 1-2 s.
        // ════════════════════════════════════════════════════════════
        function getBufferedAhead() {
            if (!videoPlayer || !videoPlayer.buffered || !videoPlayer.buffered.length) return 0;
            const ct = videoPlayer.currentTime;
            for (let i = 0; i < videoPlayer.buffered.length; i++) {
                if (videoPlayer.buffered.start(i) <= ct + 0.5 &&
                    videoPlayer.buffered.end(i)   >  ct) {
                    return videoPlayer.buffered.end(i) - ct;
                }
            }
            return 0;
        }

        async function doTokenSwap(newToken) {
            // Guard: don't run concurrently or if player isn't set up
            if (isSwapping || !player || !currentBaseStreamUrl) return;
            isSwapping = true;

            try {
                const bufferedAhead = getBufferedAhead();
                const wasPlaying    = !player.paused;
                const savedTime     = videoPlayer.currentTime;

                // Show loading spinner only if buffer is thin (< 3 s)
                if (bufferedAhead < 3) {
                    loadingSpinner.style.display = 'flex';
                }

                // Build the new tokenised URL
                currentToken = newToken;
                const newUrl = buildUrl(currentBaseStreamUrl, currentToken);

                // Point the video element at the new URL.
                // The browser will issue a Range request from ~savedTime's
                // byte offset, so it won't re-download from the start.
                videoPlayer.src = newUrl;
                videoPlayer.load();

                // Wait for enough data to seek safely
                await new Promise((resolve) => {
                    function onCanPlay() {
                        videoPlayer.removeEventListener('canplay', onCanPlay);
                        resolve();
                    }
                    videoPlayer.addEventListener('canplay', onCanPlay);

                    // Timeout fallback — if canplay doesn't fire in 8 s, carry on anyway
                    setTimeout(resolve, 8000);
                });

                // Restore position and resume
                if (savedTime > 0) {
                    videoPlayer.currentTime = savedTime;
                }
                loadingSpinner.style.display = 'none';
                if (wasPlaying) {
                    try { await videoPlayer.play(); } catch(_) {}
                }

            } catch (err) {
                console.warn('[KC] Token swap failed:', err);
                loadingSpinner.style.display = 'none';
            } finally {
                isSwapping = false;
            }
        }

        async function silentTokenRefresh() {
            if (!currentPostId) return;
            try {
                const newToken = await fetchToken(currentPostId);
                // Perform the seamless swap
                await doTokenSwap(newToken);
            } catch (err) {
                console.warn('[KC] Silent token refresh failed — keeping current token.');
                // Current stream continues uninterrupted with old token.
                // Backend should allow a short grace window (~5 s) past 60 s
                // so in-flight connections aren't killed mid-playback.
            }
        }

        function startTokenRefresh() {
            stopTokenRefresh();
            // Refresh every 45 s — token lives 60 s on backend → 15 s grace
            tokenRefreshInterval = setInterval(silentTokenRefresh, 45 * 1000);
        }

        function stopTokenRefresh() {
            if (tokenRefreshInterval) {
                clearInterval(tokenRefreshInterval);
                tokenRefreshInterval = null;
            }
        }

        // ════════════════════════════════════════════════════════════
        //  THROTTLE FIX: PRE-BUFFER GATE
        //
        //  The backend bursts at full speed for 10 s, then throttles.
        //  We exploit the burst window to fill MIN_BUFFER_SECONDS of
        //  buffer BEFORE showing the play button as active.
        //
        //  This way playback never stalls after the throttle kicks in,
        //  because the buffer is already ahead of real-time playback.
        // ════════════════════════════════════════════════════════════
        function startBufferGate(onReady) {
            bufferOverlay.classList.add('visible');

            bufferCheckInterval = setInterval(function () {
                const ahead = getBufferedAhead();
                const pct   = Math.min(100, Math.round((ahead / MIN_BUFFER_SECONDS) * 100));

                bufferFill.style.width    = pct + '%';
                bufferPercent.textContent = pct + '%';

                if (ahead >= MIN_BUFFER_SECONDS) {
                    clearInterval(bufferCheckInterval);
                    bufferCheckInterval = null;
                    bufferOverlay.classList.remove('visible');
                    onReady();
                }
            }, 300);
        }

        function stopBufferGate() {
            if (bufferCheckInterval) {
                clearInterval(bufferCheckInterval);
                bufferCheckInterval = null;
            }
            bufferOverlay.classList.remove('visible');
        }

        // ── Theme Management ──────────────────────────────────────
        themeToggle.addEventListener('change', () => {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', themeToggle.checked ? 'light' : 'dark');
        });
        function loadTheme() {
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-mode');
                themeToggle.checked = true;
            }
        }

        // ── Ambient Background ────────────────────────────────────
        function drawAmbientFrame() {
            if (!player || player.paused || player.ended || !videoPlayer.videoWidth) {
                cancelAnimationFrame(animationFrameId);
                return;
            }
            ambientCtx.drawImage(videoPlayer, 0, 0, ambientCanvas.width, ambientCanvas.height);
            animationFrameId = requestAnimationFrame(drawAmbientFrame);
        }

        // ════════════════════════════════════════════════════════════
        //  QUALITY SWITCHER — EXACTLY AS ORIGINAL
        //  Reload forces backend to drop the old Telegram connection.
        //  Token is re-fetched on the fresh page load via initializePlayer.
        // ════════════════════════════════════════════════════════════
        window.changeQuality = function (qualityUrl, qualityLabel) {
            stopTokenRefresh();
            stopBufferGate();
            const currentTime = player ? player.currentTime : 0;
            localStorage.setItem('savedUserQuality',  qualityLabel);
            localStorage.setItem('playbackPosition',  currentTime);
            // Store base URL (without old token) so fresh token is used after reload
            localStorage.setItem('savedBaseStreamUrl', qualityUrl);
            window.location.reload();
        };

        // ════════════════════════════════════════════════════════════
        //  SETUP PLAYER  (direct MP4 — no HLS.js)
        // ════════════════════════════════════════════════════════════
        async function setupPlayer(baseUrl, token, startTime) {
            currentBaseStreamUrl = baseUrl;
            currentToken         = token;

            const tokenisedUrl = buildUrl(baseUrl, token);

            // Set the video source with token baked in
            // preload="auto" is already set in HTML — browser starts
            // downloading immediately, exploiting the 10 s burst window.
            videoPlayer.src = tokenisedUrl;
            videoPlayer.load();

            player = new Plyr(videoPlayer, {
                settings : ['captions', 'quality', 'speed', 'loop'],
                controls : ['play-large', 'play', 'progress', 'current-time',
                            'mute', 'volume', 'settings', 'fullscreen'],
                // Increase Plyr's stall tolerance so throttled delivery
                // doesn't make it show its own spinner prematurely
                seekTime : 10,
            });

            player.on('ready', () => {
                // Hide the initial skeleton loader
                skeletonLoader.style.display = 'none';

                const savedVolume = localStorage.getItem('playerVolume');
                if (savedVolume) player.volume = parseFloat(savedVolume);

                // ── Resume from quality-switch saved position ──────
                if (startTime > 0) {
                    // For a resuming load: seek first, then gate the buffer
                    const onFirstCanPlay = function () {
                        videoPlayer.removeEventListener('canplay', onFirstCanPlay);
                        videoPlayer.currentTime = startTime;

                        startBufferGate(function () {
                            player.play();
                            startTokenRefresh();
                        });
                    };
                    videoPlayer.addEventListener('canplay', onFirstCanPlay);

                } else {
                    // ── Fresh load: wait for pre-buffer gate ──────
                    // We don't call play() until MIN_BUFFER_SECONDS
                    // have been downloaded (uses the burst window).
                    const onFirstCanPlay = function () {
                        videoPlayer.removeEventListener('canplay', onFirstCanPlay);
                        startBufferGate(function () {
                            startTokenRefresh();
                            // Player is ready — user can now press play
                            // We do NOT force autoplay; let the user press play
                        });
                    };
                    videoPlayer.addEventListener('canplay', onFirstCanPlay);
                }
            });

            player.on('play',         () => { ambientCanvas.classList.add('active'); drawAmbientFrame(); });
            player.on('pause',        () => { ambientCanvas.classList.remove('active'); cancelAnimationFrame(animationFrameId); });
            player.on('volumechange', () => localStorage.setItem('playerVolume', player.volume));
            player.on('waiting',      () => { if (!isSwapping) loadingSpinner.style.display = 'flex'; });
            player.on('playing',      () => loadingSpinner.style.display = 'none');
            player.on('ended',        () => stopTokenRefresh());

            // ── Error handler: if token expired mid-stream, swap now ─
            videoPlayer.addEventListener('error', async function (e) {
                const code = videoPlayer.error ? videoPlayer.error.code : 0;
                // code 4 = MEDIA_ERR_SRC_NOT_SUPPORTED (often a 403)
                if (code === 4 || code === 2) {
                    console.warn('[KC] Stream error — attempting token refresh recovery.');
                    await silentTokenRefresh();
                }
            });
        }

        // ════════════════════════════════════════════════════════════
        //  MAIN INIT
        // ════════════════════════════════════════════════════════════
        async function initializePlayer() {
            loadTheme();

            const urlParams = new URLSearchParams(window.location.search);
            const postId  = urlParams.get('view_id') || urlParams.get('id');
            const season  = urlParams.get('season')  || urlParams.get('s');
            const episode = urlParams.get('episode') || urlParams.get('e');

            if (!postId) {
                videoTitle.textContent = 'Error: Invalid Link';
                skeletonLoader.innerHTML = '<div style="color:#ff5555;">Invalid Video Link.</div>';
                return;
            }

            currentPostId = postId;

            try {
                // ── STEP 1: Fetch initial token FIRST ─────────────
                let initialToken;
                try {
                    initialToken = await fetchToken(postId);
                } catch (tokenErr) {
                    // If token endpoint fails, we still try to load (backend
                    // might allow token-less access in dev mode)
                    console.warn('[KC] Initial token fetch failed:', tokenErr);
                    initialToken = '';
                }

                // ── STEP 2: Fetch video metadata from WP API ──────
                let apiUrl = `https://www.keralacaptain.shop/wp-json/keralacaptain/v1/get_player_data?post_id=${postId}`;
                if (season && episode) apiUrl += `&season=${season}&episode=${episode}`;

                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Video not found or access denied.');
                const videoData = await response.json();

                // Set page title
                let displayTitle = videoData.title || 'Video';
                if (videoData.current_episode) displayTitle += ` - ${videoData.current_episode}`;
                videoTitle.textContent = displayTitle;

                const qualities   = videoData.stream_links;
                const qualityMap  = new Map(Object.entries(qualities));

                // Sort 1080p → 720p → 480p
                const sortedLabels = Array.from(qualityMap.keys()).sort((a, b) =>
                    parseInt(b.replace('p','')) - parseInt(a.replace('p',''))
                );

                // ── STEP 3: Resolve starting quality + position ───
                const savedQuality  = localStorage.getItem('savedUserQuality');
                const savedPosition = parseFloat(localStorage.getItem('playbackPosition')) || 0;

                let initialLabel = sortedLabels[0];
                if (savedQuality && qualityMap.has(savedQuality)) {
                    initialLabel = savedQuality;
                }

                // Base stream URL (no token) — token is appended by buildUrl()
                const initialBaseUrl = qualityMap.get(initialLabel);

                // ── STEP 4: Render quality buttons ────────────────
                qualityControls.innerHTML = '';
                sortedLabels.forEach(label => {
                    const url    = qualityMap.get(label);
                    const btn    = document.createElement('button');
                    btn.className   = 'quality-btn';
                    btn.textContent = label;
                    btn.onclick     = () => window.changeQuality(url, label);
                    if (label === initialLabel) btn.classList.add('active');
                    qualityControls.appendChild(btn);
                });

                // ── STEP 5: Launch player with token ──────────────
                await setupPlayer(initialBaseUrl, initialToken, savedPosition);

                // Clear one-time resume state
                localStorage.removeItem('playbackPosition');

            } catch (err) {
                skeletonLoader.innerHTML =
                    `<div style="color:#ff5555;padding:20px;text-align:center;">
                        Error: ${err.message}
                     </div>`;
                stopTokenRefresh();
                stopBufferGate();
            }
        }

        initializePlayer();
    });
    </script>
</body>
</html>
